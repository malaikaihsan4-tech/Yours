<!DOCTYPE html>
<html>
<head>
    <title>Do You Love Me? 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ffd1ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', 'Dancing Script', cursive;
            position: relative;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            width: 90%;
            max-width: 800px;
            border: 2px solid rgba(255,255,255,0.5);
        }
        
        h1 {
            font-family: 'Pacifico', 'Dancing Script', cursive;
            font-size: 56px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: normal;
            letter-spacing: 2px;
        }
        
        .buttons {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .btn {
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-family: 'Quicksand', 'Dancing Script', cursive;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        
        #yesBtn {
            background: linear-gradient(135deg, #ff0844 0%, #ff6a88 100%);
            color: white;
            font-size: 32px;
            padding: 18px 45px;
            border-radius: 70px;
            font-weight: 700;
        }
        
        #noBtn {
            background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%);
            color: white;
            font-size: 28px;
            padding: 15px 40px;
            border-radius: 70px;
        }
        
        .quote-box {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe8f0 100%);
            padding: 30px;
            border-radius: 50px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #c41e3a;
            line-height: 1.5;
            font-weight: 600;
            font-family: 'Dancing Script', cursive;
            border: 2px dashed #ff6a88;
        }
        
        .heart {
            display: inline-block;
            animation: heartbeat 1.5s ease infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        .floating-heart {
            position: fixed;
            pointer-events: none;
            font-size: 25px;
            animation: floatLove 3s ease-out forwards;
            z-index: 10000;
        }
        
        @keyframes floatLove {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 25px;
            }
            h1 {
                font-size: 40px;
                margin-bottom: 30px;
            }
            #yesBtn {
                font-size: 22px;
                padding: 12px 30px;
            }
            #noBtn {
                font-size: 20px;
                padding: 10px 28px;
            }
            .quote-box {
                font-size: 20px;
                padding: 20px;
                min-height: 120px;
            }
            .buttons {
                gap: 25px;
                margin-bottom: 30px;
            }
        }
        
        @media (max-height: 700px) {
            .container {
                padding: 25px 40px;
            }
            h1 {
                font-size: 48px;
                margin-bottom: 25px;
            }
            .quote-box {
                padding: 20px;
                min-height: 110px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="heart">💕</span> 
            Do You Love Me? 
            <span class="heart">💕</span>
        </h1>
        
        <div class="buttons">
            <button class="btn" id="yesBtn">YES ❤️</button>
            <button class="btn" id="noBtn">NO 💔</button>
        </div>
        
        <div class="quote-box" id="quoteBox">
            ✨ Tell me the truth... ✨
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const quoteBox = document.getElementById('quoteBox');
        
        let noCount = 0;
        let yesUnlocked = false;
        
        const loveQuotes = [
            "💕 I love you forever and always 💕",
            "🌸 You mean everything to me 🌸",
            "💖 My heart beats only for you 💖",
            "🌟 You are my sunshine 🌟",
            "💝 Every day I love you more 💝",
            "🎀 You are my dream come true 🎀",
            "✨ Forever and ever, I love you ✨",
            "💗 You make my world complete 💗",
            "🌹 I fall in love with you every day 🌹",
            "💕 You are my one and only 💕",
            "😊 Your smile is my happiness 😊",
            "💫 I will love you until the end of time 💫",
            "🎈 You are my everything 🎈",
            "💓 Loving you is the best thing I've ever done 💓",
            "⭐ You are my greatest adventure ⭐",
            "💖 I love you more than all the stars in the sky 💖",
            "🌸 You are my forever and always 🌸",
            "💕 My love for you grows stronger every second 💕",
            "🌟 You are the reason I believe in love 🌟",
            "💝 I will never stop loving you 💝",
            "❤️ Every breath I take is for you ❤️",
            "💗 You are my soulmate forever 💗"
        ];
        
        function showLoveQuote() {
            const randomIndex = Math.floor(Math.random() * loveQuotes.length);
            quoteBox.innerHTML = loveQuotes[randomIndex];
        }
        
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💕', '💖', '💗', '💓', '💝', '💘'][Math.floor(Math.random() * 7)];
            heart.className = 'floating-heart';
            heart.style.left = Math.random() * window.innerWidth + 'px';
            heart.style.bottom = '-20px';
            heart.style.fontSize = (20 + Math.random() * 35) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
        
        function makeNoButtonRun() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 50;
            const maxY = window.innerHeight - noBtn.offsetHeight - 80;
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
        
        document.addEventListener('mousemove', (e) => {
            if (yesUnlocked) {
                const btnRect = noBtn.getBoundingClientRect();
                const distance = Math.hypot(e.clientX - (btnRect.left + btnRect.width/2), 
                                           e.clientY - (btnRect.top + btnRect.height/2));
                if (distance < 100) {
                    makeNoButtonRun();
                }
            }
        });
        
        noBtn.onclick = () => {
            noCount++;
            showLoveQuote();
            
            for(let i = 0; i < 5; i++) {
                setTimeout(() => createFloatingHeart(), i * 100);
            }
            
            let newSize = 32 + (noCount * 2);
            yesBtn.style.fontSize = Math.min(newSize, 65) + 'px';
            yesBtn.style.padding = (18 + noCount) + 'px ' + (45 + noCount * 2) + 'px';
            
            let noSize = Math.max(28 - noCount, 16);
            noBtn.style.fontSize = noSize + 'px';
            
            if (noCount >= 12 && !yesUnlocked) {
                yesUnlocked = true;
                quoteBox.innerHTML = "💕 I've been waiting for this moment... 💕";
                setTimeout(() => showLoveQuote(), 1500);
            }
            
            if (yesUnlocked) {
                makeNoButtonRun();
                noBtn.style.transition = 'all 0.2s ease';
            }
        };
        
        yesBtn.onclick = () => {
            if (!yesUnlocked) {
                showLoveQuote();
                yesBtn.style.transform = 'scale(0.95)';
                setTimeout(() => yesBtn.style.transform = 'scale(1)', 300);
            } else {
                for(let i = 0; i < 80; i++) {
                    setTimeout(() => createFloatingHeart(), i * 30);
                }
                
                document.body.style.background = 'linear-gradient(135deg, #ff0844 0%, #ffb199 100%)';
                document.querySelector('.container').style.background = 'rgba(255, 255, 255, 0.96)';
                
                quoteBox.innerHTML = "💖💖💖 I LOVE YOU TOO! FOREVER AND ALWAYS! 💖💖💖";
                quoteBox.style.fontSize = "32px";
                quoteBox.style.background = 'linear-gradient(135deg, #fff0f5, #ffe6f0)';
                quoteBox.style.border = '3px solid #ff0844';
                
                noBtn.disabled = true;
                noBtn.style.opacity = '0.3';
                noBtn.style.cursor = 'not-allowed';
                noBtn.style.position = 'relative';
                
                yesBtn.innerHTML = '❤️ I LOVE YOU FOREVER ❤️';
                yesBtn.style.fontSize = '42px';
                yesBtn.disabled = true;
                
                setTimeout(() => {
                    alert('💖 I LOVE YOU! FOREVER AND EVER! 💖');
                }, 500);
            }
        };
        
        yesBtn.onmouseenter = () => {
            if (!yesUnlocked) {
                yesBtn.style.transform = 'scale(1.02)';
            } else {
                yesBtn.style.transform = 'scale(1.08)';
            }
        };
        
        yesBtn.onmouseleave = () => {
            yesBtn.style.transform = 'scale(1)';
        };
        
        window.addEventListener('resize', () => {
            if (yesUnlocked) {
                makeNoButtonRun();
            }
        });
    </script>
</body>
</html>
